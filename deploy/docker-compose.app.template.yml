name: agent-smith-app

services:
  backend:
    build:
      context: ${AGENT_SMITH_APP_CONTEXT:?set AGENT_SMITH_APP_CONTEXT}
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    env_file:
      - /opt/agent-smith/.env.infra
      - /opt/agent-smith/.env.app
    command: ${BACKEND_COMMAND:-uvicorn app.main:app --host 0.0.0.0 --port 8000}
    expose:
      - "${BACKEND_PORT:-8000}"
    networks:
      - agent_smith_internal
      - easypanel
    labels:
      traefik.enable: "true"
      traefik.docker.network: easypanel
      traefik.http.routers.agent-smith-api.rule: Host(`${AGENT_SMITH_API_HOST:?set AGENT_SMITH_API_HOST}`)
      traefik.http.routers.agent-smith-api.entrypoints: websecure
      traefik.http.routers.agent-smith-api.tls: "true"
      traefik.http.routers.agent-smith-api.tls.certresolver: letsencrypt
      traefik.http.services.agent-smith-api.loadbalancer.server.port: "${BACKEND_PORT:-8000}"

  worker:
    build:
      context: ${AGENT_SMITH_APP_CONTEXT:?set AGENT_SMITH_APP_CONTEXT}
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    env_file:
      - /opt/agent-smith/.env.infra
      - /opt/agent-smith/.env.app
    command: ${WORKER_COMMAND:-celery -A app.celery_app worker --loglevel=info}
    networks:
      - agent_smith_internal

  beat:
    build:
      context: ${AGENT_SMITH_APP_CONTEXT:?set AGENT_SMITH_APP_CONTEXT}
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    env_file:
      - /opt/agent-smith/.env.infra
      - /opt/agent-smith/.env.app
    command: ${BEAT_COMMAND:-celery -A app.celery_app beat --loglevel=info}
    networks:
      - agent_smith_internal

networks:
  agent_smith_internal:
    external: true
  easypanel:
    external: true
