
services:
  # MinIO - Object Storage para PDFs, DOCXs, TXTs
  #
  # SEGREDOS: as credenciais root vêm EXCLUSIVAMENTE de .env (mesmo padrão de
  # worker/beat), nunca literais no arquivo versionado. Defina MINIO_ROOT_USER /
  # MINIO_ROOT_PASSWORD em backend/.env (ver backend/.env.example).
  #
  # ROTAÇÃO (OBRIGATÓRIA): os defaults históricos minioadmin/minioadmin123 estão
  # COMPROMETIDOS (eram literais versionados). Em TODOS os ambientes já
  # implantados — não só em deploys novos — rotacione já:
  #   1. gere credenciais fortes e únicas (ex.: openssl rand -hex 32);
  #   2. atualize MINIO_ROOT_USER/MINIO_ROOT_PASSWORD no .env de cada ambiente e
  #      recrie o serviço minio; sincronize quem consome o storage;
  #   3. audite os logs de acesso do MinIO em busca de indício de acesso indevido
  #      ao storage (objetos lidos/apagados) enquanto o default esteve ativo.
  minio:
    image: minio/minio:latest
    container_name: agent-smith-minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - agent-smith-network

  # Qdrant - Vector Database para embeddings
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: agent-smith-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC (opcional)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent-smith-network

  # Redis - Message Buffer para WhatsApp
  redis:
    image: redis:7-alpine
    container_name: agent-smith-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - agent-smith-network

  # Celery worker — start command VERSIONADO com -Q.
  # CRÍTICO: as tasks de billing/sanitization/atendimento são roteadas para filas
  # DEDICADAS (task_routes em app/workers/celery_app.py). Um worker iniciado sem
  # -Q consome SÓ a fila default 'celery' e NUNCA executa check_sla /
  # process_inactivity_timers / process_notifications -> o ciclo de SLA, auto-close
  # e drain do outbox fica silenciosamente morto. Por isso o -Q (com 'attendance'
  # à frente) é parte do artefato versionado, não configuração manual do operador.
  worker:
    build: .
    container_name: agent-smith-worker
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "-Q", "attendance,billing,sanitization,celery"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-smith-network

  # Celery beat — agendador (singleton). Enfileira as tasks periódicas nas filas
  # dedicadas; precisa de EXATAMENTE UMA réplica para não duplicar ticks.
  beat:
    build: .
    container_name: agent-smith-beat
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-smith-network

volumes:
  minio_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

networks:
  agent-smith-network:
    driver: bridge
