version: 2

# Weekly dependency update PRs across every ecosystem in this repo.
# pip directories point at the human-edited requirements.in files (Dependabot
# updates the .in; recompile the hash-locked requirements.txt locally / in CI).
updates:
  # ---- Backend (Python) ----
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"

  # ---- Docling service (Python) ----
  - package-ecosystem: "pip"
    directory: "/docling-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "docling-service"

  # ---- Frontend (npm) ----
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"

  # ---- GitHub Actions workflows ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
