name: agent-smith-infra

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - agent_smith_internal

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agent_smith_internal

  minio:
    image: quay.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - agent_smith_internal

  docling:
    image: quay.io/docling-project/docling-serve:latest
    restart: unless-stopped
    environment:
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_LOG_LEVEL: info
      DOCLING_SERVE_MAX_SYNC_WAIT: "600"
    networks:
      - agent_smith_internal

networks:
  agent_smith_internal:
    name: agent_smith_internal

volumes:
  redis_data:
  qdrant_data:
  minio_data:
