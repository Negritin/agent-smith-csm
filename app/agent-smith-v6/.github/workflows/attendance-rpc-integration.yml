name: attendance-rpc-integration

# Roda a suíte de INTEGRAÇÃO da RPC de atendimento (rpc_attendance_transition)
# contra um Postgres efêmero, aplicando as migrations S1/S2 reais. Sem este job,
# os comportamentos centrais do §18.1/§18.2 (request_handoff idempotente,
# close_by_agent fecha sessão E conversa, tenancy fail-closed, ON CONFLICT de
# sessão concorrente, guard de p_actor_type=customer, OUTBOX no mesmo commit)
# só existem em test_attendance_rpc_integration.py — que AUTO-SKIPA quando
# ATTENDANCE_TEST_DATABASE_URL não está setado. Aqui a var É setada, então a
# suíte realmente EXECUTA e um "skipped" não pode ser confundido com "passou".

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rpc-integration:
    name: RPC integration (ephemeral Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: attendance_test
        ports:
          - 5432:5432
        # Espera o Postgres ficar pronto antes do job começar.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # A presença desta var é o gatilho que ATIVA a suíte de integração da RPC
      # (test_attendance_rpc_integration.py) — e o gate que faz
      # test_db_level_tests_are_documented FALHAR se a suíte fosse skipada em CI.
      ATTENDANCE_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/attendance_test
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install runtime deps + pytest
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # O conftest de tests/services importa app.services/app.api em tempo de
          # SESSÃO (_restore_real_app_packages), então a suíte precisa de TODAS as
          # deps de runtime (httpx, pydantic-settings, supabase, ...) — não só
          # psycopg. Sem isso a coleta quebra com ModuleNotFoundError e o job falha
          # inteiro. psycopg já está pinado no requirements; pytest é dev-only.
          # (Mesmo padrão de install do attendance-tests.yml.)
          pip install -r requirements.txt
          pip install "pytest==8.*"

      - name: Run RPC integration suite (must actually run, not skip)
        working-directory: backend
        run: |
          python -m pytest \
            tests/services/test_attendance_rpc_integration.py \
            tests/services/test_attendance_service.py \
            -v -ra
